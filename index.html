    <!-- 自带hash路由，打开自动跳转到#/list/ -->
    <script>
// 自动生成32位数字+字母随机串（和原链接格式一致）
function getRandomStr() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let str = "";
    for (let i = 0; i < 32; i++) {
        str += chars[Math.floor(Math.random() * chars.length)];
    }
    return str;
}
// 自动拼接#/list/ + 随机串
window.location.hash = "/list/" + getRandomStr();
    </script>
